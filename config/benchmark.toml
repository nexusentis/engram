# LongMemEval Benchmark Configuration
# Edit this file to change models, thresholds, and settings without recompiling.
# Env vars override these values (see CLAUDE.md for env var reference).

[answerer]
model = "google/gemini-3.1-pro-preview"
temperature = 0.0
max_tokens = 500
max_iterations = 20
tool_result_limit = 12000
prefetch_explicit = 15
prefetch_deductive = 10
prefetch_messages = 20
use_strategy = true
relative_dates = true
agentic = true
enable_consolidation = false
consolidation_threshold = 0.92
enable_graph_retrieval = false
enable_causal_links = false
enable_cross_encoder_rerank = false
cross_encoder_rerank_top_k = 30

[answerer.gates]
preference_min_retrievals = 3
enumeration_min_retrievals = 3
update_min_retrievals = 3
abstention_min_retrievals = 5
anti_abstention_keyword_threshold = 3
preference_keyword_threshold = 2
loop_break_consecutive_dupes = 3

[answerer.graph_augment]
enabled = false
seed_limit = 5
fact_limit = 6
neighbors_per_seed = 5
facts_per_entity = 20
facts_per_neighbor = 10

[ingester]
model = "gpt-4o-mini"
concurrency = 100
extraction_seed = 42
extraction_mode = "local-fast"
enable_consolidation = false
consolidation_threshold = 0.92
skip_messages = false

[llm]
max_retries = 12
backoff_cap_secs = 60
token_refresh_mins = 45
request_timeout_secs = 90

[benchmark]
answer_concurrency = 7
qdrant_url = "http://localhost:6334"

# Model profiles — replaces ALL if model.contains(...) branching.
# Each model MUST have a profile. Unknown models cause a startup error.

[[models]]
name = "gpt-4o"
base_url = "https://api.openai.com/v1/chat/completions"
api_key_env = "OPENAI_API_KEY"
max_tokens_field = "max_tokens"
supports_temperature = true
prompt_price_per_m = 2.50
completion_price_per_m = 10.00

